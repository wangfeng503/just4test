let API_KEY = '';
let API_URL = 'https://api.openai.com/v1/chat/completions';
let MODEL = 'gpt-4o-mini';

// 鎻愪緵鍟嗛厤缃?const PROVIDERS = {
  openai: { url: 'https://api.openai.com/v1/chat/completions', model: 'gpt-4o-mini' },
  deepseek: { url: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat' },

// 淇濆瓨 API Key
document.getElementById('apiProvider').addEventListener('change', function() {
  const isCustom = this.value === 'custom';
  document.getElementById('customUrlGroup').style.display = isCustom ? 'block' : 'none';
});

function saveApiKey() {
  const provider = document.getElementById('apiProvider').value;
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) {
    alert('璇疯緭鍏?API Key');
    return;
  }
  API_KEY = key;
  const config = PROVIDERS[provider];
  API_URL = provider === 'custom' ? document.getElementById('customUrl').value.trim() : config.url;
  MODEL = config.model;
  document.getElementById('apiKeyModal').classList.add('hidden');
}

// 鍒囨崲鏍囩椤?function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  event.target.classList.add('active');
  document.getElementById(tab + 'Panel').classList.add('active');
}

// 璋冪敤澶фā鍨?API
async function callAI(systemPrompt, userPrompt, resultId, loadingId) {
  const resultEl = document.getElementById(resultId);
  const loadingEl = document.getElementById(loadingId);
  
  if (!API_KEY) {
    document.getElementById('apiKeyModal').classList.remove('hidden');
    return;
  }
  
  resultEl.classList.remove('show');
  loadingEl.classList.add('show');
  
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userPrompt }
        ],
        temperature: 0.7,
        max_tokens: 3000
      })
    });
    
    const data = await response.json();
    if (data.error) {
      resultEl.textContent = '閿欒锛? + data.error.message;
    } else {
      resultEl.textContent = data.choices[0].message.content;
    }
    resultEl.classList.add('show');
  } catch (err) {
    resultEl.textContent = '璇锋眰澶辫触锛? + err.message + '\n\n璇锋鏌?API Key 鍜岀綉缁滆繛鎺ャ€?;
    resultEl.classList.add('show');
  } finally {
    loadingEl.classList.remove('show');
  }
}
